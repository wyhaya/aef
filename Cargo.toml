[package]
name = "aef"
version = "0.2.1"
edition = "2021"
authors = ["wyhaya <wyhaya@gmail.com>"]
license = "MIT"
description = "Util for file encryption"
homepage = "https://github.com/wyhaya/aef"
repository = "https://github.com/wyhaya/aef.git"
readme = "README.md"

[profile.release]
lto = true
codegen-units = 1
strip = "symbols"

[profile.dev.package.scrypt]
opt-level = 3

[dependencies]
aes-gcm = "0.9.4"
clap = { version = "2.34.0", default-features = false }
rand = "0.8.5"
rpassword = "6.0.1"
scrypt = "0.10.0"
