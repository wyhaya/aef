[package]
name = "aef"
version = "0.3.0"
edition = "2021"
authors = ["wyhaya <wyhaya@gmail.com>"]
license = "MIT"
description = "Encrypted file archiver"
homepage = "https://github.com/wyhaya/aef"
repository = "https://github.com/wyhaya/aef.git"
readme = "README.md"

[profile.release]
lto = true
codegen-units = 1
strip = "symbols"

[dependencies]
aes-gcm = "0.10.1"
clap = { version = "4.0.14", features = ["derive"] }
rand = "0.8.5"
dialoguer = "0.10.2"
scrypt = "0.10.0"
walkdir = "2.3.2"
brotli = "3.3.4"
unic-normal = "0.9.0"
unic-ucd = "0.9.0"

[profile.dev.package.scrypt]
opt-level = 3