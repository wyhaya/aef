[package]
name = "aef"
version = "0.2.2"
edition = "2021"
authors = ["wyhaya <wyhaya@gmail.com>"]
license = "MIT"
description = "Util for file encryption"
homepage = "https://github.com/wyhaya/aef"
repository = "https://github.com/wyhaya/aef.git"
readme = "README.md"

[profile.release]
lto = true
codegen-units = 1
strip = "symbols"

[dependencies]
aes-gcm = "0.9.4"
clap = { version = "3.2.11", features = ["derive"] }
rand = "0.8.5"
rpassword = "7.0.0"
scrypt = "0.10.0"

[profile.dev.package.scrypt]
opt-level = 3